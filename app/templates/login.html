{% extends "auth_base.html" %}
{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Login</h2>
    <form method="post" action="{{ url_for('login') }}">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; color: #555;">Username</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; color: #555;">Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
        </div>
        <button type="submit" class="primary-btn" style="width: 100%; padding: 12px; font-size: 16px;">Log In</button>
        <div style="text-align: center; margin-top: 15px;">
            <a href="{{ url_for('signup') }}" style="color: #0056b3; text-decoration: none;">Create an account</a>
        </div>
    </form>
</div>
{% endblock %}
